<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#26221c" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#15130f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#a89e8d">
    <text x="80" y="100" font-size="20" letter-spacing="6">ASIF DRAXI</text>
    <circle cx="225" cy="93" r="6" fill="#f97316"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#ebe6dc">
    <text x="80" y="270" font-size="96" font-weight="700" letter-spacing="-3">Site Reliability</text>
    <text x="80" y="380" font-size="96" font-weight="700" letter-spacing="-3">
      <tspan>Engineer</tspan><tspan fill="#f97316" font-style="italic">.</tspan>
    </text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" fill="#a89e8d">
    <text x="80" y="460" font-size="28">Platforms that keep production calm at 2 AM.</text>
  </g>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" letter-spacing="2" fill="#a89e8d">
    <text x="80" y="560">SRE  ·  DEVOPS  ·  CLOUD  ·  AI</text>
  </g>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#a89e8d">
    <text x="1120" y="560" text-anchor="end">asifad.github.io</text>
  </g>
</svg>
